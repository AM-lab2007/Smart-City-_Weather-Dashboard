<html>

<head>
    <title>Weather Dashboard</title>
    <style>
        .main {
            display:grid;
            grid-template-areas: "title-bar"
                                "container";
            
            grid-template-rows: 100px auto;
            gap: 20px;
            
            

        }
        .title-bar{
            background-color: lightgray;
            grid-area: title-bar;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }
        .body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black
        }
        .container{
            
            height: auto;
            grid-template-columns: 1fr 1fr;
            display: grid;
            grid-template-areas: "left right";
            grid-template-rows: auto;
            gap : 0px 20px;
        }
        .left{
            height: 600px;
            
            display: grid;
            grid-template-areas: "left-top"
                                "left-bottom";
            grid-template-rows: 1.5fr 1fr;
            grid-template-columns: auto;
            gap: 20px;
            
        }
        .right{
            height: 600px;
            
            display: grid;
            grid-template-areas: "right-top"
                                "right-bottom";
            grid-template-rows: 1fr 1.5fr;
            grid-template-columns: auto;
            gap: 20px;

        }
        .left-top{
            background-color: yellow;
            border-radius: 12px;
        }
        .left-bottom{
            background-color: orange;
            border-radius: 12px;
        }
        .right-top{
            
            display: grid;
            grid-template-areas: "right-top1 right-top2 right-top3";
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto;
            border-radius: 12px;
            gap : 20px;
        }
        .right-bottom{
            background-color: lightblue;
            border-radius: 12px;
        }
        .right-top1{
            background-color: lightgreen;
            border-radius: 12px;
           
        }
        .right-top2{
            background-color: lightcoral;
            border-radius: 12px;
        }
        .right-top3{
            background-color: maroon;
            border-radius: 12px;
        }

        

    </style>
</head>

<body>
    <div class="main">
        <div class="title-bar">
            <h1>Aditya's Weather Dashboard</h1>

        </div>
        <div class="container">
            
            <div class="left">

                <div class="left-top">
                </div>
                <div class="left-bottom">
                </div>
            </div>
            <div class="right">
                <div class="right-top">
                    <div class="right-top1">

                    </div>
                    <div class="right-top2">

                    </div>
                    <div class="right-top3">

                    </div>
                </div>
                <div class="right-bottom">
                </div>

            </div>
        </div>
    </div>



</body>

</html>
