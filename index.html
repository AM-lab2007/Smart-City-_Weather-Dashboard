<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background-color: #1e293b;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .light {
      background-color: #f1f5f9;
      color: black;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background-color: #334155;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .light .card {
      background-color: white;
    }

    button {
      padding: 6px 10px;
      margin: 5px;
      border: none;
      background-color: #38bdf8;
      border-radius: 5px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid gray;
      padding: 8px;
      text-align: center;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
    }
  </style>

  <script>
    
    let forecastData = [
      { day: "Monday", temp: 28 },
      { day: "Tuesday", temp: 30 },
      { day: "Wednesday", temp: 27 },
      { day: "Thursday", temp: 26 },
      { day: "Friday", temp: 29 }
    ];

   
    function updateWeather() {
      let city = document.getElementById("cityInput").value || "Pune";

      document.getElementById("cityName").innerText = city;
      document.getElementById("temp").innerText = "28°C";
      document.getElementById("humidity").innerText = "60%";
      document.getElementById("wind").innerText = "15 km/h";
    }

    
    function renderTable(data) {
      let table = document.getElementById("tableBody");

      table.innerHTML = data.map(item => `
        <tr>
          <td>${item.day}</td>
          <td>${item.temp}°C</td>
        </tr>
      `).join("");
    }

    function filterHot() {
      let filtered = forecastData.filter(item => item.temp > 28);
      renderTable(filtered);
    }

    function filterCold() {
      let filtered = forecastData.filter(item => item.temp <= 28);
      renderTable(filtered);
    }

    function sortAsc() {
      let sorted = [...forecastData].sort((a, b) => a.temp - b.temp);
      renderTable(sorted);
    }

    function sortDesc() {
      let sorted = [...forecastData].sort((a, b) => b.temp - a.temp);
      renderTable(sorted);
    }
 
    function resetTable() {
      renderTable(forecastData);
    }

    function likeApp() {
      alert("❤️ You liked this dashboard!");
    }
    
    function toggleTheme() {
      document.body.classList.toggle("light");
    }

    
    window.onload = () => renderTable(forecastData);
  </script>
</head>

<body>

<div class="container">

  <h1>🌤 Weather Dashboard</h1>

  <div class="card">
    <input id="cityInput" placeholder="Enter city">
    <button onclick="updateWeather()">Search</button>
    <button onclick="toggleTheme()">Toggle Theme</button>
  </div>

  <div class="card">
    <h2 id="cityName">Pune</h2>
    <p>Temperature: <span id="temp">28°C</span></p>
    <p>Humidity: <span id="humidity">60%</span></p>
    <p>Wind: <span id="wind">15 km/h</span></p>
    <button onclick="likeApp()">❤️ Like</button>
  </div>

  <div class="card">
    <h3>Hourly Forecast</h3>
    <p>10:00 - 26°C</p>
    <p>11:00 - 27°C</p>
    <p>12:00 - 28°C</p>
    <p>13:00 - 29°C</p>
    <p>14:00 - 30°C</p>
  </div>

  <div class="card">
    <h3>Filter / Sort</h3>
    <button onclick="filterHot()">Hot Days</button>
    <button onclick="filterCold()">Cold Days</button>
    <button onclick="sortAsc()">Sort ↑</button>
    <button onclick="sortDesc()">Sort ↓</button>
    <button onclick="resetTable()">Reset</button>
  </div>

  <div class="card">
    <h3>5-Day Forecast</h3>
    <table>
      <thead>
        <tr>
          <th>Day</th>
          <th>Temp</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="footer">
    Made by Aditya Musale ❤️
  </div>

</div>

</body>
</html>
