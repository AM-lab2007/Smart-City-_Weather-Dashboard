<html>
<head>
<title>Weather Dashboard</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f6f8;
}

/* MAIN CONTAINER */
.main {
    width: 90%;
    margin: 30px auto;
}

/* TITLE BAR */
.title-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* LEFT SIDE (LOGO + TEXT) */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* SEARCH BAR */
.search {
    display: flex;
    gap: 10px;
}

.search input {
    padding: 8px;
    width: 250px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.search button {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: black;
    color: white;
}

/* RIGHT BUTTON */
.support {
    padding: 8px 15px;
    background: #111827;
    color: white;
    border-radius: 10px;
    border: none;
}

</style>
</head>

<body>

<div class="main">

    <!-- TITLE BAR -->
    <div class="title-bar">

        <!-- LEFT -->
        <div class="logo">
            <span>☁️</span>
            <h3>weather</h3>
        </div>

        <!-- SEARCH -->
        <div class="search">
            <input type="text" placeholder="Search city">
            <button>🔍</button>
        </div>

        <!-- RIGHT -->
        <button class="support">Support Project</button>

    </div>

</div>

</body>
</html>
